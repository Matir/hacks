<!DOCTYPE html>
<html>
<head>
    <title>HandHolder</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .workspace-card { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .active { border-color: green; background-color: #f0fff0; }
        .status { font-weight: bold; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>HandHolder Workspaces</h1>
    <div id="workspaces">
        {{range .}}
        <div class="workspace-card {{if .Active}}active{{end}}" id="ws-{{.ID}}">
            <h2>{{.Name}}</h2>
            <p>Path: <code>{{.Workspace}}</code></p>
            <p>Port: <span id="port-{{.ID}}">{{.Port}}</span></p>
            <p>Status: <span class="status" id="status-{{.ID}}">{{.Status}}</span></p>
            <button onclick="launch('{{.ID}}')" id="btn-launch-{{.ID}}" {{if .Active}}class="hidden"{{end}}>Launch</button>
            <button onclick="stop('{{.ID}}')" id="btn-stop-{{.ID}}" {{if not .Active}}class="hidden"{{end}}>Stop</button>
            <a href="http://localhost:{{.Port}}" target="_blank" id="link-{{.ID}}" {{if not .Active}}class="hidden"{{end}}>Open OpenHands</a>
        </div>
        {{end}}
    </div>

    <script>
        async function launch(id) {
            document.getElementById('status-' + id).innerText = 'Starting...';
            document.getElementById('btn-launch-' + id).disabled = true;
            await fetch('/launch?id=' + id);
            pollStatus(id);
        }

        async function stop(id) {
            document.getElementById('status-' + id).innerText = 'Stopping...';
            document.getElementById('btn-stop-' + id).disabled = true;
            await fetch('/stop?id=' + id);
            pollStatus(id);
        }

        async function pollStatus(id) {
            const port = document.getElementById('port-' + id).innerText;
            
            const interval = setInterval(async () => {
                const resp = await fetch(`/status?port=${port}`);
                const data = await resp.json();
                const statusSpan = document.getElementById('status-' + id);
                statusSpan.innerText = data.status;
                
                if (data.status === 'running' || data.status === 'not running' || data.status.startsWith('Error')) {
                    clearInterval(interval);
                    updateUI(id, data.status === 'running');
                }
            }, 2000);
        }

        function updateUI(id, active) {
            const card = document.getElementById('ws-' + id);
            const btnLaunch = document.getElementById('btn-launch-' + id);
            const btnStop = document.getElementById('btn-stop-' + id);
            const link = document.getElementById('link-' + id);

            if (active) {
                card.classList.add('active');
                btnLaunch.classList.add('hidden');
                btnStop.classList.remove('hidden');
                btnStop.disabled = false;
                link.classList.remove('hidden');
            } else {
                card.classList.remove('active');
                btnLaunch.classList.remove('hidden');
                btnLaunch.disabled = false;
                btnStop.classList.add('hidden');
                link.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
