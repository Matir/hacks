<!DOCTYPE html>
<html>
<head>
    <title>HandHolder</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .workspace-card { border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .active { border-color: green; background-color: #f0fff0; }
        .status { font-weight: bold; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HandHolder Workspaces</h1>
    <div id="workspaces">
        {{range .}}
        <div class="workspace-card {{if .Active}}active{{end}}" id="ws-{{.ID}}">
            <h2>{{.Name}}</h2>
            <p>Port: {{.Port}}</p>
            <p>Status: <span class="status" id="status-{{.ID}}">{{.Status}}</span></p>
            <button onclick="launch('{{.ID}}')">Launch</button>
            {{if .Active}}
            <a href="http://localhost:{{.Port}}" target="_blank">Open OpenHands</a>
            {{end}}
        </div>
        {{end}}
    </div>

    <script>
        async function launch(id) {
            document.getElementById('status-' + id).innerText = 'Starting...';
            await fetch('/launch?id=' + id);
            pollStatus(id);
        }

        async function pollStatus(id) {
            const wsElement = document.querySelector(`[id="ws-${id}"]`);
            const port = wsElement.querySelector('p').innerText.split(': ')[1];
            
            const interval = setInterval(async () => {
                const resp = await fetch(`/status?port=${port}`);
                const data = await resp.json();
                document.getElementById('status-' + id).innerText = data.status;
                
                if (data.status === 'Running') {
                    clearInterval(interval);
                    location.reload(); // Reload to show "Open" link and active state
                }
                if (data.status.startsWith('Error')) {
                    clearInterval(interval);
                }
            }, 2000);
        }
    </script>
</body>
</html>
