# Configuration for Audio Transcription Pipeline

[paths]
input_dir = "input"
output_dir = "output"
prompt_file = "prompts/post_process.md"

[preprocessing]
enabled = true
ffmpeg_path = "ffmpeg" # Use "ffmpeg" if it is in your system PATH, otherwise specify absolute path
chunking_enabled = false
chunk_max_duration = 300 # Max chunk duration (5 minutes)
silence_threshold_db = -30 # Silence decibel threshold
silence_duration = 0.5 # Min silence duration in seconds

[transcriber]
# Supported providers: "huggingface", "openai_compatible"
provider = "huggingface"
enable_speaker_attribution = false

# For Hugging Face:
# Dedicated Endpoint URL or Inference API URL
endpoint_url = "https://api-inference.huggingface.co/models/ibm-granite/granite-speech-4.1-2b-plus"
model = "ibm-granite/granite-speech-4.1-2b-plus"
api_key_env = "HF_API_KEY"
# Timeout in seconds for transcription API calls (e.g. increase for cold starts or large files)
# timeout = 600

# Example for Baseten / OpenAI Compatible:
# provider = "openai_compatible"
# endpoint_url = "https://model-XXXXXXXX.baseten.co/v1/audio/transcriptions"
# model = "ibm-granite/granite-speech-4.1-2b-plus"
# api_key_env = "BASETEN_API_KEY"

# Example for CrispASR:
# provider = "crispasr"
# endpoint_url = "https://api.crispasr.ai/v1"
# model = "crisp-model"
# api_key_env = "CRISP_API_KEY"

# Example for VibeVoice (Hugging Face custom endpoint with hotwords):
# provider = "vibevoice"
# endpoint_url = "https://YOUR_HF_ENDPOINT_URL.endpoints.huggingface.cloud"
# model = "vibevoice-asr"
# api_key_env = "HF_API_KEY"
# hotwords = "word1, word2, word3"

# RSS feeds to sync before processing.
# Each entry may include an optional max_episodes limit (most recent N).
# [[rss.feeds]]
# url = "https://example.com/podcast.rss"
# max_episodes = 10

[post_processor]
# Supported providers: "gemini", "openai_compatible"
provider = "openai_compatible"
endpoint_url = "https://openrouter.ai/api/v1"
model = "google/gemini-2.5-pro" # Example model on OpenRouter
api_key_env = "OPENROUTER_API_KEY"
temperature = 0.2

# Example for Gemini directly:
# provider = "gemini"
# model = "gemini-2.5-flash"
# api_key_env = "GEMINI_API_KEY"
