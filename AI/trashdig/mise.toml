[tools]
python = "3.14"
uv = "latest"

[env]
_.file = '.env'
_.python.venv = ".venv"

[tasks.test]
run = "uv run pytest tests"

[tasks.lint]
run = "uv run ruff check ."

[tasks.format]
run = "uv run ruff format ."

[tasks.coverage]
run = "uv run pytest --cov=src/trashdig tests"

[tasks.run]
run = "uv run trashdig"
